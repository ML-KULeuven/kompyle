name: build

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      # see pyproject.toml
      - name: Set macos deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      # https://github.com/orgs/community/discussions/27086
      - name: Set lowercase repository
        if: runner.os == 'Linux'
        run: echo "REPO_LC=${REPO,,}" >> $GITHUB_ENV
        env:
          REPO: ${{ github.repository }}

      - name: Cache macos dependencies
        if: runner.os == 'macOS'
        id: cache-macos-deps
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: macos-deps-${{ hashFiles('scripts/build_deps.sh') }}

      # - name: Validate cached macos dependencies
      #   if: runner.os == 'macOS' && steps.cache-macos-deps.outputs.cache-hit == 'true'
      #   id: validate-cache
      #   run: bash scripts/validate_deps.sh
      #   continue-on-error: true
      # - name: Install macos dependencies
      #   if: |
      #     runner.os == 'macOS' && (
      #       steps.cache-macos-deps.outputs.cache-hit != 'true' ||
      #       steps.validate-cache.outcome == 'failure'
      #     )
      #   run: bash scripts/build_deps.sh
      - name: Install macos dependencies
        if: runner.os == 'macOS' && steps.cache-macos-deps.outputs.cache-hit != 'true'
        run: bash scripts/build_deps.sh

      - name: Log in to GHCR
        if: runner.os == 'Linux'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*i686 *ppc64le *s390x *win32* *musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: >-
            ghcr.io/${{ env.REPO_LC }}/manylinux-deps:latest
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: "cd {project} && pytest {project}/tests"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Prepare source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          python -m pip install build
          python -m build --sdist
      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-source
          path: dist/*.tar.gz
