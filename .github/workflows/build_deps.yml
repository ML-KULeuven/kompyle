name: Build deps image

on:
  push:
    paths:
      - "scripts/build_deps.sh"
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # https://github.com/orgs/community/discussions/27086
      - name: Set lowercase repository
        run: echo "REPO_LC=${REPO,,}" >> $GITHUB_ENV
        env:
          REPO: ${{ github.repository }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/deps.dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/manylinux-deps:latest

