name: build-solvers

on:
  workflow_call:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]
        staticcompile: [OFF]

    steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install gmp for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        tar xf gmp-6.3.0.tar.xz
        cd gmp-6.3.0
        ./configure --enable-static -enable-cxx --enable-shared --with-pic
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac
      if: contains(matrix.os, 'macos') && matrix.staticcompile == 'OFF'
      run: |
        wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac static
      if: contains(matrix.os, 'macos') && matrix.staticcompile == 'ON'
      run: |
        wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure --static
        make -j8
        sudo make install
        cd ..

    - name: Install mpfr for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/mpfr/mpfr-4.2.1.tar.xz
        tar xf mpfr-4.2.1.tar.xz
        cd mpfr-4.2.1
        ./configure --enable-static -enable-cxx --enable-shared
        make -j8
        sudo make install
        cd ..

    - name: Install dependencies for Linux
      if: contains(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -yq help2man libgmp-dev libmpfr-dev

    - name: Install flint
      run: |
        wget https://github.com/flintlib/flint/releases/download/v3.2.0-rc1/flint-3.2.0-rc1.tar.gz
        tar xzf flint-3.2.0-rc1.tar.gz
        cd flint-3.2.0-rc1
        ./configure --enable-static --enable-shared
        make -j8
        sudo make install
        cd ..

    - name: Checkout Cadical
      uses: actions/checkout@v4
      with:
        repository: meelgroup/cadical
        ref: master
        path: cadical
    - name: Build Cadical
      run: |
        cd cadical
        CXXFLAGS=-fPIC ./configure --competition
        make -j8
        cd ..

    - name: Checkout Cadiback
      uses: actions/checkout@v4
      with:
        repository: meelgroup/cadiback
        ref: main
        path: cadiback
    - name: Build Cadiback
      run: |
        cd cadiback
        CXX=c++ ./configure
        make -j8
        cd ..

    - name: Install cadical and cadiback libs (Linux)
      if: contains(matrix.os, 'ubuntu')
      run: |
        sudo cp cadical/build/libcadical.so  /usr/local/lib/
        sudo cp cadiback/libcadiback.so      /usr/local/lib/
        sudo ldconfig

    - name: Install cadical and cadiback libs (macOS)
      if: contains(matrix.os, 'macos')
      run: |
        sudo cp cadical/build/libcadical.so /usr/local/lib/
        sudo cp cadiback/libcadiback.so     /usr/local/lib/

    - name: Checkout breakid
      uses: actions/checkout@v4
      with:
        repository: meelgroup/breakid
        ref: master
        path: breakid
    - name: Build and install Breakid
      run: |
        cd breakid
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_TESTING=OFF -DSTATICCOMPILE=${{ matrix.staticcompile }} ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Checkout CMS
      uses: actions/checkout@v4
      with:
        repository: msoos/cryptominisat
        ref: master
        path: cryptominisat
        submodules: 'true'
    - name: Build and install CMS
      run: |
        cd cryptominisat
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_TESTING=OFF -DSTATICCOMPILE=${{ matrix.staticcompile }} ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Checkout SBVA
      uses: actions/checkout@v4
      with:
        repository: meelgroup/SBVA
        ref: master
        path: sbva
    - name: Build and install SBVA
      run: |
        cd sbva
        mkdir build && cd build
        ln -s ../scripts/*.sh .
        cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_TESTING=OFF -DSTATICCOMPILE=${{ matrix.staticcompile }} ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Build and install cereal
      run: |
        wget https://github.com/USCiLab/cereal/archive/v1.3.2.tar.gz
        tar xvf v1.3.2.tar.gz
        # Fix cereal compilation on clang 19+; see https://github.com/USCiLab/cereal/pull/835
        if sed --version >/dev/null 2>&1; then
            sed -i 's|::template apply|::apply|' cereal-1.3.2/include/cereal/types/tuple.hpp
        else
            sed -i '' 's|::template apply|::apply|' cereal-1.3.2/include/cereal/types/tuple.hpp
        fi
        cd cereal-1.3.2
        mkdir build && cd build
        cmake -DJUST_INSTALL_CEREAL=ON ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Build and install armadillo
      run: |
        wget https://sourceforge.net/projects/arma/files/armadillo-14.0.2.tar.xz
        tar xvf armadillo-14.0.2.tar.xz
        cd armadillo-14.0.2
        ./configure
        make -j6
        sudo make install
        cd ..

    - name: Build and install ensmallen
      run: |
        wget https://github.com/mlpack/ensmallen/archive/refs/tags/2.22.2.tar.gz
        tar xvf 2.22.2.tar.gz
        cd ensmallen-2.22.2
        mkdir build && cd build
        cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Checkout mlpack
      uses: actions/checkout@v4
      with:
        repository: mlpack/mlpack
        ref: 4.6.2
        path: mlpack
    - name: Build and install mlpack
      run: |
        cd mlpack
        mkdir build && cd build
        cmake -DBUILD_SHARED_LIBS=ON -DBUILD_CLI_EXECUTABLES=OFF ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Checkout arjun
      uses: actions/checkout@v4
      with:
        repository: meelgroup/arjun
        ref: master
        path: arjun
    - name: Build and install arjun
      run: |
        cd arjun
        mkdir build && cd build
        cmake \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DSTATICCOMPILE=${{ matrix.staticcompile }} \
          -DENABLE_TESTING=OFF \
          -S ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Run ldconfig (Linux)
      if: contains(matrix.os, 'ubuntu')
      run: sudo ldconfig

    - name: Checkout approxmc
      uses: actions/checkout@v4
      with:
        repository: meelgroup/approxmc
        ref: master
        path: approxmc
        submodules: 'true'
    - name: Build and install approxmc
      run: |
        cd approxmc
        mkdir build && cd build
        cmake \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DSTATICCOMPILE=${{ matrix.staticcompile }} \
          -DENABLE_TESTING=OFF \
          -S ..
        cmake --build . --config ${{ matrix.build_type }} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    - name: Checkout ganak
      uses: actions/checkout@v4
      with:
        repository: meelgroup/ganak
        ref: master
        path: ganak
        submodules: 'true'
    - name: Build and install ganak
      run: |
        cd ganak
        mkdir -p build && cd build
        cmake \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DSTATICCOMPILE=${{ matrix.staticcompile }} \
        -DENABLE_TESTING=OFF \
        -S ..
        cmake --build . --config ${{matrix.build_type}} -v
        sudo cmake --install . --config ${{ matrix.build_type }}
        cd ../..

    # FIXME(Ibrahim):
    # once the changes from the PR at ML-KULeuven/klay are pushed.
    # building & installing klay wouldn't be needed.
    - name: Checkout klay
      uses: actions/checkout@v4
      with:
        repository: IbrahimElk/klay
        ref: ref-separation-of-concerns
        path: klay
    - name: Build and install klay
      run: |
        cd klay
        pip install .
        cd ../..
    - name: Stage klay into /usr/local
      run: |
        KLAY_DIR=$(python -c "import klay, os; print(os.path.dirname(klay.__file__))")
        sudo cp $KLAY_DIR/libklay*      /usr/local/lib/
        sudo cp -r $KLAY_DIR/include    /usr/local/include/klay
        sudo cp -r $KLAY_DIR/cmake/klay /usr/local/lib/cmake/klay

    - name: Stage solver artifacts
      run: |
        mkdir -p solver-artifacts/bin
        mkdir -p solver-artifacts/lib
        mkdir -p solver-artifacts/include
        mkdir -p solver-artifacts/lib/cmake

        cp -r /usr/local/lib/libcadical*        solver-artifacts/lib/
        cp -r /usr/local/lib/libcadiback*       solver-artifacts/lib/
        cp -r /usr/local/lib/libcryptominisat5* solver-artifacts/lib/
        cp -r /usr/local/lib/libarjun*          solver-artifacts/lib/
        cp -r /usr/local/lib/libbreakid*        solver-artifacts/lib/
        cp -r /usr/local/lib/libsbva*           solver-artifacts/lib/
        cp -r /usr/local/lib/libapproxmc*       solver-artifacts/lib/
        cp -r /usr/local/lib/libganak*          solver-artifacts/lib/
        cp -r /usr/local/lib/libklay*           solver-artifacts/lib/

        cp /usr/local/bin/arjun                 solver-artifacts/bin/
        cp /usr/local/bin/ganak                 solver-artifacts/bin/
        cp /usr/local/bin/sbva                  solver-artifacts/bin/
        cp /usr/local/bin/breakid               solver-artifacts/bin/
        cp /usr/local/bin/approxmc              solver-artifacts/bin/

        for pkg in cryptominisat5 arjun breakid sbva approxmc ganak klay; do
          find /usr/local/lib/cmake -maxdepth 2 -iname "${pkg}*" -type d \
            -exec cp -r {} solver-artifacts/lib/cmake/ \;
        done

        for pkg in cryptominisat5 arjun breakid sbva approxmc ganak klay; do
          [ -d /usr/local/include/${pkg} ] && \
          cp -r /usr/local/include/${pkg} solver-artifacts/include/
        done

    - name: Upload solver artifacts
      uses: actions/upload-artifact@v4
      with:
        name: solver-libs-${{ matrix.os }}
        path: solver-artifacts/
